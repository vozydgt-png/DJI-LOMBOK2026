<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJI LOMBOK 2026</title>
<style>
  :root{
    --sky-top:#0b1d2e;
    --sky-bot:#142d40;
    --sand:#e9dcc3;
    --rinjani:#4f7c63;
    --gili:#3a8fa3;
    --ink:#0b1d2e;
    --line:rgba(233,220,195,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, #1d3b52 0%, transparent 60%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 100%);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    color: var(--sand);
    display:flex;
    justify-content:center;
    padding: 48px 18px 80px;
  }
  .page{
    width:100%;
    max-width: 460px;
  }

  /* Header */
  header{
    text-align:center;
    margin-bottom: 44px;
  }
  .eyebrow{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gili);
    margin-bottom: 10px;
  }
  h1{
    font-size: 34px;
    line-height: 1.15;
    margin: 0 0 12px;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .coords{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(233,220,195,0.55);
  }

  /* Horizon line — signature element */
  .horizon{
    width:100%;
    height: 64px;
    margin: 28px 0 8px;
  }

  /* Sections */
  .section{
    margin-bottom: 40px;
  }
  .section-head{
    display:flex;
    align-items:baseline;
    gap: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }
  .section-title{
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .section-sub{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(233,220,195,0.45);
    margin-left: auto;
  }

  .linklist{
    display:flex;
    flex-direction:column;
    gap: 12px;
  }
  .linkcard{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color: var(--ink);
    background: var(--sand);
    border-radius: 10px;
    padding: 16px 18px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 1px 0 rgba(0,0,0,0.08);
  }
  .linkcard:hover, .linkcard:focus-visible{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    outline: none;
  }
  .linkcard:active{
    transform: translateY(0px);
  }
  .dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink:0;
  }
  .rinjani .dot{ background: var(--rinjani); }
  .gili .dot{ background: var(--gili); }

  .linktext{
    flex:1;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .linktext .name{
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .linktext .desc{
    font-size: 12px;
    color: rgba(11,29,46,0.6);
  }
  .arrow{
    font-size: 16px;
    color: rgba(11,29,46,0.4);
  }

  footer{
    text-align:center;
    margin-top: 52px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: rgba(233,220,195,0.35);
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce){
    .linkcard{ transition:none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="eyebrow">Aerial Footage Archive</div>
    <h1>DJI LOMBOK<br>2026</h1>
    <div class="coords">8.4° S &nbsp;·&nbsp; 116.4° E</div>
  </header>

  <svg class="horizon" viewBox="0 0 460 64" preserveAspectRatio="none">
    <polyline points="0,50 60,50 90,18 120,50 160,50 185,30 210,50 460,50"
      fill="none" stroke="#4f7c63" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="50" x2="460" y2="50" stroke="rgba(233,220,195,0.2)" stroke-width="1"/>
    <circle cx="385" cy="20" r="14" fill="#3a8fa3" opacity="0.85"/>
  </svg>

  <!-- RINJANI -->
  <section class="section">
    <div class="section-head">
      <span class="section-title">Gunung Rinjani</span>
      <span class="section-sub">3726 mdpl</span>
    </div>
    <div class="linklist rinjani">
      <a class="linkcard" href="https://drive.google.com/drive/folders/1eHfI_7AwrzBGqVglfyciYSnxfdIY95ET?usp=sharing" target="_blank" rel="noopener">
        <span class="dot"></span>
        <span class="linktext">
          <div class="name">Link Rinjani 1</div>
          <div class="desc">RINJANI PT.1</div>
        </span>
        <span class="arrow">→</span>
      </a>
      <a class="linkcard" href="https://drive.google.com/drive/folders/1jZWNIC0KXpQvxPRXwYIbebmuvTaK2njN?usp=sharing" target="_blank" rel="noopener">
        <span class="dot"></span>
        <span class="linktext">
          <div class="name">Link Rinjani 2</div>
          <div class="desc">RINJANI PT.2</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </div>
  </section>

  <!-- GILI TRAWANGAN -->
  <section class="section">
    <div class="section-head">
      <span class="section-title">Gili Trawangan</span>
      <span class="section-sub">Island</span>
    </div>
    <div class="linklist gili">
      <a class="linkcard" href="https://drive.google.com/drive/folders/1k9jIgHf82LFh1nV9SssEy-j_D3FhvAek" target="_blank" rel="noopener">
        <span class="dot"></span>
        <span class="linktext">
          <div class="name">Link Gili 1</div>
          <div class="desc">GILI PT.1</div>
        </span>
        <span class="arrow">→</span>
      </a>
      <a class="linkcard" href="https://drive.google.com/drive/folders/1cSApqW64QCF92qkZPMzbrUyFDw1Togzk?usp=sharing" target="_blank" rel="noopener">
        <span class="dot"></span>
        <span class="linktext">
          <div class="name">Link Gili 2</div>
          <div class="desc">GILI PT.2</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </div>
  </section>

  <footer>Shot on DJI Osmo Action 5</footer>

</div>
</body>
</html>
